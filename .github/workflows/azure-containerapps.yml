# Azure: API 이미지만 빌드·배포 (프론트는 Vercel에서 별도 배포)
# workflow_dispatch — 수동 실행
#
# Secrets:
#   AZURE_RESOURCE_GROUP, AZURE_ACR_NAME, AZURE_API_APP_NAME
#   (권장 OIDC) AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#   (폴백) AZURE_CREDENTIALS
#
# docs/azure-deployment.md 참고

name: Azure API (Container Apps)

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  IMAGE_API: foresight-api

jobs:
  build-and-deploy-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_ACR_NAME: ${{ secrets.AZURE_ACR_NAME }}
      AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
      AZURE_API_APP_NAME: ${{ secrets.AZURE_API_APP_NAME }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        if: ${{ env.AZURE_CLIENT_ID != '' && env.AZURE_TENANT_ID != '' && env.AZURE_SUBSCRIPTION_ID != '' }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Azure Login (Service Principal JSON Fallback)
        if: ${{ !(env.AZURE_CLIENT_ID != '' && env.AZURE_TENANT_ID != '' && env.AZURE_SUBSCRIPTION_ID != '') }}
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR build (API)
        run: |
          az acr build \
            -r "${{ env.AZURE_ACR_NAME }}" \
            -t "${{ env.IMAGE_API }}:${{ github.sha }}" \
            -t "${{ env.IMAGE_API }}:latest" \
            -f Dockerfile \
            .

      - name: Update Container App revision
        run: |
          az containerapp update \
            -g "${{ env.AZURE_RESOURCE_GROUP }}" \
            -n "${{ env.AZURE_API_APP_NAME }}" \
            --image "${{ env.AZURE_ACR_NAME }}.azurecr.io/${{ env.IMAGE_API }}:${{ github.sha }}"
