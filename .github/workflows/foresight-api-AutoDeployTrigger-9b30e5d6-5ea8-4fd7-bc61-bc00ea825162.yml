name: Trigger auto deployment for foresight-api

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/foresight-api-AutoDeployTrigger-9b30e5d6-5ea8-4fd7-bc61-bc00ea825162.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.FORESIGHTAPI_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.FORESIGHTAPI_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.FORESIGHTAPI_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: foresightacr2720.azurecr.io
          registryUsername: ${{ secrets.FORESIGHTAPI_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.FORESIGHTAPI_REGISTRY_PASSWORD }}
          containerAppName: foresight-api
          resourceGroup: foresight-rg-sea
          imageToBuild: foresightacr2720.azurecr.io/foresight-api:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


